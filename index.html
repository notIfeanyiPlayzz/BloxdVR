<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdVR v1.3.3 | Ultimate Hub</title>
    <style>
        :root { --primary: #2ecc00; --bg: #050505; --panel: #111; --text: #eee; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }

        /* 🎵 Music Control Floating Button */
        .audio-toggle {
            position: fixed; top: 20px; right: 20px; background: var(--panel);
            border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; transition: 0.3s; z-index: 100;
            outline: none;
        }
        .audio-toggle:hover { background: var(--primary); color: black; }

        .main-hub {
            display: grid; grid-template-columns: 320px 1fr; gap: 30px;
            background: var(--panel); padding: 40px; border-radius: 20px;
            border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.7);
            max-width: 900px; width: 95%;
        }

        /* 🖼️ Feature A: Skin Preview Pane */
        .preview-pane {
            background: #000; border-radius: 12px; padding: 25px;
            text-align: center; border: 1px solid #222;
        }
        .preview-img {
            width: 200px; height: 200px; image-rendering: pixelated;
            margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary));
        }

        /* 👤 Character Grid Selection */
        .content-pane { display: flex; flex-direction: column; justify-content: space-between; }
        .avatar-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; margin: 20px 0; 
        }
        .avatar-card { 
            background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s; text-align: center;
        }
        .avatar-card:hover { border-color: #444; transform: translateY(-3px); }
        .avatar-card.selected { border-color: var(--primary); background: #142514; }
        .avatar-card img { width: 55px; height: 55px; image-rendering: pixelated; }

        /* 🚀 Feature B: Server Button */
        .enter-btn { 
            background: var(--primary); color: black; border: none;
            padding: 18px; font-size: 1.1rem; font-weight: 900;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .enter-btn:hover { letter-spacing: 3px; filter: brightness(1.2); }

        @media (max-width: 700px) {
            .main-hub { grid-template-columns: 1fr; height: auto; overflow-y: auto; display: block; }
            .preview-pane { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- 🔊 Feature C: Background Music (Updated Path) -->
    <button class="audio-toggle" id="musicBtn" onclick="toggleAudio()">MUSIC: OFF</button>
    <audio id="bgMusic" loop src="./assets/music/minecraft-theme_q5K6toI.mp3"></audio>

    <div class="main-hub">
        <!-- Preview Section -->
        <div class="preview-pane">
            <img id="viewImg" src="./assets/icons/bob_icon.png" class="preview-img" onerror="this.src='https://www.minecraftskins.com'">
            <h2 id="viewName" style="color:var(--primary); margin: 10px 0;">Bob</h2>
            <p id="viewDesc" style="font-size: 0.85rem; color: #777;">Initializing sync...</p>
        </div>

        <!-- Selection Section -->
        <div class="content-pane">
            <div style="margin-bottom: 10px;">
                <h1 style="margin:0; font-size: 1.8rem;">Bloxd<span style="color:var(--primary)">VR</span> Hub</h1>
                <p style="font-size: 0.8rem; color: #555;">Version 1.3.3 Stable • Asset Sync Active</p>
            </div>

            <div class="avatar-grid" id="grid"></div>

            <button class="enter-btn" onclick="enterWorld()">Enter Official Server</button>
        </div>
    </div>

<script>
    const repoPath = "./assets/icons/";
    const characters = [
        { name: 'Bob', bio: 'The classic frontier scout.' },
        { name: 'Leo', bio: 'Master voxel architect.' },
        { name: 'Sanjay', bio: 'Expert survivalist.' },
        { name: 'Enoch', bio: 'The iron-clad guardian.' },
        { name: 'Emma', bio: 'Precision sky-builder.' },
        { name: 'Isabel', bio: 'Oceanic explorer.' },
        { name: 'Imara', bio: 'Neon city specialist.' },
        { name: 'Sara', bio: 'High-altitude merchant.' }
    ];

    const grid = document.getElementById('grid');
    const viewImg = document.getElementById('viewImg');
    const viewName = document.getElementById('viewName');
    const viewDesc = document.getElementById('viewDesc');
    
    let current = localStorage.getItem('bloxd_avatar') || 'Bob';

    characters.forEach(char => {
        const card = document.createElement('div');
        card.className = `avatar-card ${char.name === current ? 'selected' : ''}`;
        
        const iconSrc = `${repoPath}${char.name.toLowerCase()}_icon.png`;
        card.innerHTML = `<img src="${iconSrc}" onerror="this.src='https://www.minecraftskins.com'">`;
        
        if(char.name === current) {
            viewImg.src = iconSrc;
            viewName.innerText = char.name;
            viewDesc.innerText = char.bio;
        }

        card.onclick = () => {
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            viewImg.src = iconSrc;
            viewName.innerText = char.name;
            viewDesc.innerText = char.bio;
            localStorage.setItem('bloxd_avatar', char.name);
        };
        grid.appendChild(card);
    });

    function enterWorld() {
        window.location.href = 'https://bloxd.io';
    }

    // Music Logic
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    
    function toggleAudio() {
        if (music.paused) {
            music.play().catch(e => console.error("Playback failed:", e));
            btn.innerText = "MUSIC: ON";
            btn.style.background = "var(--primary)";
            btn.style.color = "black";
        } else {
            music.pause();
            btn.innerText = "MUSIC: OFF";
            btn.style.background = "var(--panel)";
            btn.style.color = "var(--primary)";
        }
    }
</script>
</body>
</html>
