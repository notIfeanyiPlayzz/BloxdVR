<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BloxdVR v1.4.0 | Interactive Hub</title>
    <style>
        :root { --primary: #2ecc00; --bg: #050505; --card-bg: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { background: rgba(15, 15, 15, 0.95); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 90%; max-width: 800px; z-index: 10; }
        
        /* 🎛️ Music Controls */
        .audio-box { position: absolute; top: 20px; right: 20px; background: #222; padding: 10px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--primary); }
        
        /* 👤 Avatar Grid */
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .avatar-card { background: var(--card-bg); padding: 10px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .avatar-card:hover { border-color: var(--primary); transform: scale(1.05); }
        .avatar-card.selected { border-color: var(--primary); background: #1a2e1a; }
        .avatar-card img { width: 60px; height: 60px; image-rendering: pixelated; border-radius: 4px; }

        /* 🖼️ Skin Preview Modal */
        #previewModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; max-width: 400px; }
        .preview-img { width: 180px; height: 180px; image-rendering: pixelated; border: 4px solid #444; border-radius: 10px; margin-bottom: 15px; }

        button { background: var(--primary); color: black; border: none; padding: 12px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        .close-btn { background: #444; color: white; margin-top: 15px; padding: 8px; }
    </style>
</head>
<body>

    <!-- 🎵 Background Music -->
    <div class="audio-box">
        <span style="font-size: 0.7rem; color: var(--primary); font-weight: bold;">VOXEL BEATS</span>
        <button onclick="toggleMusic()" id="musicBtn" style="padding: 5px 15px; font-size: 0.8rem; width: auto; margin: 0;">PLAY</button>
        <audio id="bgMusic" loop src="https://files.freemusicarchive.org"></audio>
    </div>

    <div class="container">
        <h1>Bloxd<span style="color:var(--primary)">VR</span> <small style="font-size:0.5em; opacity:0.6;">v1.4.0</small></h1>
        
        <div class="avatar-grid" id="grid"></div>

        <!-- 🚀 Direct Server Link -->
        <button onclick="window.location.href='https://bloxd.io'">ENTER OFFICIAL SERVER</button>
    </div>

    <!-- 🔍 Preview Modal -->
    <div id="previewModal">
        <div class="modal-content">
            <h2 id="prevName">Skin Name</h2>
            <img id="prevImg" class="preview-img" src="" alt="Preview">
            <p id="prevBio" style="color: #aaa; font-style: italic;"></p>
            <button onclick="closePreview()">SELECT & EQUIP</button>
            <button class="close-btn" onclick="closePreview()">CANCEL</button>
        </div>
    </div>

<script>
    const repoPath = "./assets/icons/";
    const avatars = [
        { name: 'Bob', bio: 'The classic explorer.' },
        { name: 'Leo', bio: 'Master of the voxel arts.' },
        { name: 'Sanjay', bio: 'Silent but deadly in PvP.' },
        { name: 'Enoch', bio: 'Ancient guardian of the hub.' },
        { name: 'Emma', bio: 'Swift and precise builder.' },
        { name: 'Isabel', bio: 'Legendary world hopper.' },
        { name: 'Imara', bio: 'The neon specialist.' },
        { name: 'Sara', bio: 'Sky-island architect.' }
    ];

    const grid = document.getElementById('grid');
    const modal = document.getElementById('previewModal');

    avatars.forEach(p => {
        const card = document.createElement('div');
        card.className = 'avatar-card';
        card.innerHTML = `<img src="${repoPath + p.name.toLowerCase()}_icon.png" onerror="this.src='https://www.minecraftskins.com'">`;
        
        card.onclick = () => {
            document.getElementById('prevName').innerText = p.name;
            document.getElementById('prevBio').innerText = p.bio;
            document.getElementById('prevImg').src = repoPath + p.name.toLowerCase() + "_icon.png";
            modal.style.display = 'flex';
            localStorage.setItem('bloxd_avatar', p.name);
        };
        grid.appendChild(card);
    });

    function closePreview() { modal.style.display = 'none'; }

    function toggleMusic() {
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (music.paused) { music.play(); btn.innerText = "PAUSE"; } 
        else { music.pause(); btn.innerText = "PLAY"; }
    }
</script>
</body>
</html>
