<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxdVR Hub v1.3.4</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">

<!-- Model Viewer -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:root {
  --bg: #050505;
  --panel: #111;
  --accent: #2ecc00;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Pixelify Sans', monospace;
}

body {
  background: var(--bg);
  color: var(--accent);
  overflow: hidden;
}

/* Loading Screen */
#boot {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-size: 2rem;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { opacity: .6 }
  50% { opacity: 1 }
}

.progress {
  width: 200px;
  height: 10px;
  border: 1px solid var(--accent);
  margin-top: 15px;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  animation: load 2s forwards;
}

@keyframes load {
  to { width: 100% }
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 350px 1fr;
  height: 100vh;
}

/* Left Panel */
.sidebar {
  background: var(--panel);
  padding: 15px;
  overflow-y: auto;
  border-right: 2px solid #000;
}

.card {
  background: #000;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: .2s;
  border: 1px solid #222;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px var(--accent);
}

.asset-monitor {
  margin-top: 15px;
  background: #000;
  padding: 10px;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid var(--accent);
}

/* Right Panel */
.main {
  position: relative;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: #000;
}

/* Loader ring */
.loader {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 50px;
  height: 50px;
  border: 4px solid #222;
  border-top: 4px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Top Right */
.topbar {
  position: absolute;
  top: 10px;
  right: 10px;
}

button {
  background: #000;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 8px 12px;
  cursor: pointer;
}

/* Glitch button */
.launch {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 1.2rem;
}

.launch:hover {
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  100% { transform: translate(1px, -1px); }
}
</style>
</head>

<body>

<!-- Boot Screen -->
<div id="boot">
  <div class="logo">BLOXDVR HUB</div>
  <div>Syncing Assets...</div>
  <div class="progress"><div class="bar"></div></div>
</div>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar" id="characterList"></div>

  <!-- Main -->
  <div class="main">
    
    <div class="topbar">
      <button id="musicToggle">Music: OFF</button>
    </div>

    <model-viewer id="viewer" auto-rotate camera-controls></model-viewer>

    <div class="loader" id="loader"></div>

    <button class="launch" onclick="location.href='vr.html'">
      Launch VR Mode
    </button>

    <div class="asset-monitor" id="monitor"></div>

  </div>

</div>

<!-- Audio -->
<audio id="bgm" loop src="assets/music/minecraft-theme_q5K6toI.mp3"></audio>
<audio id="selectSound" src="assets/music/select.mp3"></audio>

<script>
/* Character Registry */
const characters = [
  {name:"Bob", skin:"2025_10_04_bob-skin-from-bloxd-io-23562468.png"},
  {name:"Emma", skin:"2025_10_04_emma-skin-from-bloxd-io-23562472.png"},
  {name:"Leo", skin:"2025_10_04_leo-skin-from-bloxd-io-23562475.png"},
  {name:"Isabel", skin:"2025_10_19_isabelv2-23590830.png"},
  {name:"Sanjay", skin:"2025_10_04_sanjay-skin-from-bloxd-io-23562484.png"},
  {name:"Imara", skin:"2025_10_04_imara-skin-from-bloxd-io-23562482.png"},
  {name:"Enoch", skin:"2025_10_07_enoch-skin-from-bloxd-23568141.png"},
  {name:"Sara", skin:"2025_10_04_sara-skin-from-bloxd-io-23562479.png"}
];

const list = document.getElementById("characterList");
const viewer = document.getElementById("viewer");
const monitor = document.getElementById("monitor");
const loader = document.getElementById("loader");

/* Build UI */
characters.forEach(char => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerText = char.name;

  div.onclick = () => {
    document.getElementById("selectSound").play();

    const modelPath = `assets/models/skins/${char.name}.glb`;
    const texturePath = `assets/textures/${char.skin}`;

    loader.style.display = "block";

    viewer.src = modelPath;

    monitor.innerText =
      `MODEL:\n${modelPath}\n\nTEXTURE:\n${texturePath}`;

    localStorage.setItem("bloxd_avatar", char.name);
  };

  list.appendChild(div);
});

/* Model loading events */
viewer.addEventListener("load", () => {
  loader.style.display = "none";
});

/* Music Toggle */
const bgm = document.getElementById("bgm");
const btn = document.getElementById("musicToggle");

btn.onclick = () => {
  if (bgm.paused) {
    bgm.play();
    btn.innerText = "Music: ON";
  } else {
    bgm.pause();
    btn.innerText = "Music: OFF";
  }
};

/* Boot screen */
setTimeout(() => {
  document.getElementById("boot").style.opacity = "0";
  setTimeout(() => document.getElementById("boot").remove(), 500);
}, 2000);
</script>

</body>
</html>
