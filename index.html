<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BloxdVR v1.3.3 | Stable Build</title>
    <style>
        :root { --primary: #2ecc00; --bg: #0a0a0a; --panel: #161616; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .hub-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            background: var(--panel);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* 🖼️ Left Side: Preview */
        .preview-box {
            background: #000;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
        }
        
        .preview-img {
            width: 160px;
            height: 160px;
            image-rendering: pixelated;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }

        /* 👤 Right Side: Selection */
        .selection-box { display: flex; flex-direction: column; }
        
        .avatar-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 20px;
        }

        .avatar-card { 
            background: #222; 
            padding: 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.2s;
        }

        .avatar-card:hover { border-color: #555; }
        .avatar-card.active { border-color: var(--primary); background: #1a2e1a; }

        .avatar-card img { width: 50px; height: 50px; image-rendering: pixelated; }

        button { 
            background: var(--primary); color: black; border: none;
            padding: 15px; font-weight: bold; border-radius: 5px;
            cursor: pointer; font-size: 1rem;
        }
        
        button:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="hub-container">
        <!-- Feature A: Skin Preview -->
        <div class="preview-box">
            <h3 style="margin-top:0;">PREVIEW</h3>
            <img id="mainPreview" src="./assets/icons/bob_icon.png" class="preview-img" onerror="this.src='https://www.minecraftskins.com'">
            <h2 id="activeName" style="color:var(--primary); margin: 5px 0;">Bob</h2>
            <p id="activeStatus" style="font-size: 0.8rem; color: #888;">Ready for Deployment</p>
        </div>

        <div class="selection-box">
            <h1 style="margin-top:0;">BloxdVR <span style="color:var(--primary)">v1.3.3</span></h1>
            <p style="font-size: 0.9rem; color: #aaa;">Select an identity to synchronize with the world.</p>
            
            <div class="avatar-grid" id="grid"></div>

            <!-- Feature B: Server Link -->
            <button onclick="enterWorld()">SYNC & ENTER WORLD</button>
        </div>
    </div>

<script>
    const repoPath = "./assets/icons/";
    const characters = [
        { name: 'Bob', status: 'Frontier Scout' },
        { name: 'Leo', status: 'Master Architect' },
        { name: 'Sanjay', status: 'Void Runner' },
        { name: 'Enoch', status: 'Iron Guardian' },
        { name: 'Emma', status: 'Precision Pilot' },
        { name: 'Isabel', status: 'Deep Sea Miner' },
        { name: 'Imara', status: 'Neon Technic' },
        { name: 'Sara', status: 'Sky Merchant' }
    ];

    const grid = document.getElementById('grid');
    const mainPreview = document.getElementById('mainPreview');
    const activeName = document.getElementById('activeName');
    const activeStatus = document.getElementById('activeStatus');

    characters.forEach(char => {
        const card = document.createElement('div');
        card.className = 'avatar-card';
        if(char.name === 'Bob') card.classList.add('active');

        card.innerHTML = `<img src="${repoPath + char.name.toLowerCase()}_icon.png" onerror="this.src='https://www.minecraftskins.com'">`;
        
        card.onclick = () => {
            // Update UI
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            
            // Update Preview (Feature A)
            mainPreview.src = repoPath + char.name.toLowerCase() + "_icon.png";
            activeName.innerText = char.name;
            activeStatus.innerText = char.status;
            
            // Save Data
            localStorage.setItem('selectedChar', char.name);
        };
        grid.appendChild(card);
    });

    function enterWorld() {
        // Feature B: Specific Lobby
        window.location.href = 'https://bloxd.io';
    }
</script>
</body>
</html>
