name: Build & Upload Meta Quest APK

on:
  push:
    branches:
      - main

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: |
          npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          echo "BUBBLEWRAP_SKIP_JDK_INSTALL=true" >> $GITHUB_ENV
          echo "CI=true" >> $GITHUB_ENV

      - name: Generate Android Keystore
        run: |
          keytool -genkeypair \
            -keystore user.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=MetaQuestApp,O=Dev,C=US"

      - name: Verify Keystore
        run: |
          ls -lh user.keystore

      - name: Build APK
        env:
          CI: true
          BUBBLEWRAP_SKIP_JDK_INSTALL: true
        run: |
          bubblewrap build \
            --yes \
            --signingKeyPath=user.keystore \
            --signingKeyAlias="${{ secrets.KEY_ALIAS }}" \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyAliasPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Locate APK
        run: |
          mkdir -p build/Android

          APK=$(find . -type f -name "*.apk" | grep -i release | head -n 1)

          if [ -z "$APK" ]; then
            echo "❌ APK not found"
            find . -name "*.apk"
            exit 1
          fi

          echo "✅ APK found: $APK"
          cp "$APK" build/Android/bloxdvr.apk

      - name: Setup OVR Platform Utility
        uses: RageAgainstThePixel/setup-ovr-platform-util@v1.2.0

      - name: Upload Meta Quest Build
        uses: RageAgainstThePixel/upload-meta-quest-build@v2.2.0
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: build/Android
          releaseChannel: ALPHA
