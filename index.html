<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BloxdVR v1.3.2 | World Presence Hub</title>
    <style>
        :root { --primary: #2ecc00; --bg: #050505; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* 🎬 Animated Background (GIF Fallback for Easy Upload) */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com') no-repeat center center;
            background-size: cover; opacity: 0.2; z-index: -1; filter: blur(3px);
        }

        .container { 
            background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 20px;
            border: 1px solid #333; text-align: center; backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 900px;
        }

        .avatar-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; margin: 30px 0; 
        }

        .avatar-card { 
            background: #111; padding: 15px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s;
        }

        .avatar-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .avatar-card.selected { border-color: var(--primary); background: #1a2e1a; }

        .avatar-card img { 
            width: 70px; height: 70px; image-rendering: pixelated; 
            border-radius: 5px; margin-bottom: 10px; 
        }

        button { 
            background: var(--primary); color: black; border: none;
            padding: 15px 60px; font-size: 1.2rem; font-weight: bold;
            border-radius: 5px; cursor: pointer; text-transform: uppercase;
        }

        .status { margin-top: 20px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <h1 style="margin-top:0;">Bloxd<span style="color:var(--primary)">VR</span> v1.3.2</h1>
        <p>Select your identity (Skins by <b>bloxdskins</b>)</p>

        <div class="avatar-grid" id="grid"></div>

        <button onclick="window.location.href='https://bloxd.io'">Enter Bloxd VR</button>

        <div class="status">
            Remote Deployment • Assets: GitHub Pages • Engine: v1.3.2-Stable
        </div>
    </div>

<script>
    // YOUR DIRECT GITHUB PATHS
    const repoPath = "https://isiguzoflorence521-gif.github.io";
    const avatars = ['Bob', 'Leo', 'Sanjay', 'Enoch', 'Emma', 'Isabel', 'Imara', 'Sara'];

    const grid = document.getElementById('grid');
    let selected = localStorage.getItem('bloxd_avatar') || 'Bob';

    avatars.forEach(name => {
        const card = document.createElement('div');
        card.className = `avatar-card ${selected === name ? 'selected' : ''}`;
        
        // Final Path Fix: lowercase_icon.png
        const iconUrl = repoPath + name.toLowerCase() + "_icon.png";

        card.innerHTML = `
            <img src="${iconUrl}" alt="${name}" onerror="this.src='https://www.minecraftskins.com'">
            <div style="font-weight:bold; font-size:0.8rem;">${name}</div>
        `;

        card.onclick = () => {
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            localStorage.setItem('bloxd_avatar', name);
            console.log("v1.3.2 Set: " + name);
        };
        grid.appendChild(card);
    });
</script>
</body>
</html>
