name: Build & Upload Meta Quest APK

on:
  push:
    branches:
      - main

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # ✅ IMPORTANT: NO updateConfig (prevents interactive prompt)
      # Bubblewrap already reads config from your repo

      - name: Generate Android Keystore
        run: |
          keytool -genkeypair \
            -keystore user.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=MetaQuestApp,O=Dev,C=US"

            - name: Configure Bubblewrap environment
               run: |
                 echo "BUBBLEWRAP_SKIP_JDK_INSTALL=true" >> $GITHUB_ENV

      - name: Build APK
        run: |
          bubblewrap build \
            --yes \
            --signingKeyPath=user.keystore \
            --signingKeyAlias="${{ secrets.KEY_ALIAS }}" \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyAliasPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Locate APK
        run: |
          mkdir -p build/Android
          APK=$(find . -name "*release*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "❌ APK not found"
            exit 1
          fi

          echo "✅ APK found: $APK"
          cp "$APK" build/Android/bloxdvr.apk

      - name: Setup Meta Quest CLI
        uses: RageAgainstThePixel/setup-ovr-platform-util@v1.2.0

      - name: Upload to Meta Quest Alpha
        uses: RageAgainstThePixel/upload-meta-quest-build@v2.2.0
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: build/Android
          releaseChannel: ALPHA
