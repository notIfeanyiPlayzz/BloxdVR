<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | BloxdVR Sync Lost</title>
    
    <!-- 🖼️ Assets Mapping -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2ecc00; --bg: #050505; --panel: #111; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--primary); 
            font-family: 'Pixelify Sans', sans-serif;
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; overflow: hidden; text-align: center;
        }

        .error-code { font-size: 8rem; margin: 0; line-height: 1; text-shadow: 0 0 20px var(--primary); }
        .glitch-text { font-size: 1.5rem; color: #eee; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .box {
            background: var(--panel); border: 1px solid #333; padding: 40px; 
            border-radius: 15px; border-left: 5px solid var(--primary);
            max-width: 500px; margin-top: 30px;
        }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }

        .btn {
            padding: 15px 30px; font-size: 1.1rem; font-weight: bold; 
            border-radius: 5px; cursor: pointer; text-transform: uppercase; 
            font-family: 'Pixelify Sans', sans-serif; transition: 0.2s; 
            text-decoration: none; display: inline-block; border: none;
        }

        .btn-home { background: var(--primary); color: #000; }
        .btn-home:hover { transform: scale(1.05); filter: brightness(1.2); }

        .btn-bug { background: #222; color: #eee; border: 1px solid #444; }
        .btn-bug:hover { background: #333; border-color: #666; transform: scale(1.05); }
        
        .binary { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.05; pointer-events: none; z-index: -1; font-family: monospace; overflow: hidden; }
    </style>
</head>
<body>

    <div class="binary" id="bin"></div>

    <h1 class="error-code">404</h1>
    <div class="glitch-text">Asset Sync Failed</div>

    <div class="box">
        <p>The coordinates you entered do not exist in the <b>BloxdVR</b> database. The chunk failed to load or the link has been corrupted.</p>
        
        <div class="btn-group">
            <a href="index.html" class="btn btn-home">Return to Hub</a>
            <!-- 🐛 Directly links to your repository issues page -->
            <a href="https://github.com/isiguzoflorence521-gif/BloxdVR/issues" target="_blank" class="btn btn-bug">Report Bug</a>
        </div>
    </div>

    <script>
        // Matrix-style background effect
        const bin = document.getElementById('bin');
        let text = "";
        for(let i=0; i<2000; i++) { text += Math.round(Math.random()); }
        bin.innerText = text;
    </script>
</body>
</html>
