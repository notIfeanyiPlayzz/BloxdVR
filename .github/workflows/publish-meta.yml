name: Build & Upload Meta Quest APK

on:
  push:
    branches:
      - main

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > user.keystore

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig \
            --jdkPath="$JAVA_HOME" \
            --androidSdkPath="$ANDROID_SDK_ROOT"

      # Assumes a Bubblewrap project already exists in the repo.
      # If not, initialize one locally and commit it first.
      - name: Build APK
        run: |
          bubblewrap build \
            --signingKeyPath=user.keystore \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyAliasPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Locate APK
        run: |
          mkdir -p build/Android
          APK=$(find . -name "*release*.apk" | head -n 1)
          echo "APK found: $APK"
          cp "$APK" build/Android/bloxdvr.apk

      - name: Setup Meta Quest CLI
        uses: RageAgainstThePixel/setup-ovr-platform-util@v1.2.0

      - name: Upload to Meta Quest Alpha
        uses: RageAgainstThePixel/upload-meta-quest-build@v2.2.0
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: build/Android
          releaseChannel: ALPHA
