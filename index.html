<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxdVR Hub v1.3.5</title>
<link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
<link rel="shortcut icon" href="assets/icons/favicon.ico">


<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:root {
  --bg:#050505;
  --panel:#111;
  --accent:#2ecc00;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Pixelify Sans',monospace;}

body{background:var(--bg);color:var(--accent);overflow:hidden;}

.container{
  display:grid;
  grid-template-columns:350px 1fr;
  height:100vh;
}

/* Boot */
#boot{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;
}
.logo{font-size:2rem;animation:pulse 1.5s infinite;}
@keyframes pulse{50%{opacity:1}0%,100%{opacity:.6}}
.progress{width:200px;height:10px;border:1px solid var(--accent);margin-top:10px;}
.bar{height:100%;background:var(--accent);width:0;animation:load 2s forwards;}
@keyframes load{to{width:100%}}

/* Sidebar */
.sidebar{background:var(--panel);padding:10px;overflow:auto;}
.card{
  background:#000;margin-bottom:10px;padding:8px;cursor:pointer;
  border:1px solid #222;transition:.2s;text-align:center;
}
.card img{width:100%;image-rendering:pixelated;}
.card:hover{transform:scale(1.05);box-shadow:0 0 12px var(--accent);}

.asset-monitor{
  margin-top:10px;background:#000;padding:8px;
  font-family:monospace;font-size:12px;border:1px solid var(--accent);
}

/* Main */
.main{position:relative;}
model-viewer{width:100%;height:100%;background:#000;}

.loader{
  position:absolute;top:50%;left:50%;
  width:50px;height:50px;border-radius:50%;
  border:4px solid #222;border-top:4px solid var(--accent);
  animation:spin 1s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* UI */
.topbar{position:absolute;top:10px;right:10px;}
button{
  background:#000;color:var(--accent);
  border:1px solid var(--accent);padding:6px 10px;margin-left:5px;
  cursor:pointer;
}

.launch{
  position:absolute;bottom:20px;right:20px;font-size:1.2rem;
}
.launch:hover{animation:glitch .25s infinite;}
@keyframes glitch{
  0%{transform:translate(1px,-1px)}
  50%{transform:translate(-1px,1px)}
  100%{transform:translate(1px,-1px)}
}

#xrStatus{
  position:absolute;bottom:10px;left:10px;font-size:12px;
}
</style>
</head>

<body>

<!-- Boot -->
<div id="boot">
  <div class="logo">BLOXDVR HUB</div>
  <div>Syncing Assets...</div>
  <div class="progress"><div class="bar"></div></div>
</div>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div id="characterList"></div>
    <div class="asset-monitor" id="monitor">No asset selected</div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <button id="musicToggle">Music: OFF</button>
      <button id="phoneVR">Phone VR</button>
    </div>

    <model-viewer id="viewer" auto-rotate camera-controls></model-viewer>
    <div class="loader" id="loader"></div>

    <button class="launch" id="launchVR">Launch VR Mode</button>

    <div id="xrStatus"></div>

  </div>

</div>

<!-- Audio -->
<audio id="bgm" loop src="assets/music/minecraft-theme_q5K6toI.mp3"></audio>
<audio id="selectSound" src="assets/music/select.mp3"></audio>

<script>
/* ===== Character Registry ===== */
const characters = [
  {name:"Bob", skin:"2025_10_04_bob-skin-from-bloxd-io-23562468.png"},
  {name:"Emma", skin:"2025_10_04_emma-skin-from-bloxd-io-23562472.png"},
  {name:"Leo", skin:"2025_10_04_leo-skin-from-bloxd-io-23562475.png"},
  {name:"Isabel", skin:"2025_10_19_isabelv2-23590830.png"},
  {name:"Sanjay", skin:"2025_10_04_sanjay-skin-from-bloxd-io-23562484.png"},
  {name:"Imara", skin:"2025_10_04_imara-skin-from-bloxd-io-23562482.png"},
  {name:"Enoch", skin:"2025_10_07_enoch-skin-from-bloxd-23568141.png"},
  {name:"Sara", skin:"2025_10_04_sara-skin-from-bloxd-io-23562479.png"}
];

const viewer = document.getElementById("viewer");
const monitor = document.getElementById("monitor");
const loader = document.getElementById("loader");

/* ===== Build Character Cards ===== */
characters.forEach(char=>{
  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="assets/icons/${char.name.toLowerCase()}_icon.png">
    <div>${char.name}</div>
  `;

  div.onclick=async()=>{
    const selectSound=document.getElementById("selectSound");
    if(selectSound) selectSound.play();

    const modelPath=`models/skins/${char.name}.glb`;
    const texturePath=`assets/textures/${char.skin}`;

    loader.style.display="block";
    viewer.src=modelPath;

    viewer.addEventListener("load", async ()=>{
      try{
        const mat=viewer.model.materials[0];
        const tex=await viewer.createTexture(texturePath);
        mat.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
      }catch(e){
        console.warn("Texture bind failed", e);
      }
      loader.style.display="none";
    },{once:true});

    monitor.innerText=`MODEL:\n${modelPath}\n\nTEXTURE:\n${texturePath}`;

    localStorage.setItem("bloxd_session", JSON.stringify({
      avatar:char.name,
      model:modelPath,
      texture:texturePath
    }));
  };

  document.getElementById("characterList").appendChild(div);
});

/* ===== Restore Last Avatar ===== */
const saved=JSON.parse(localStorage.getItem("bloxd_session")||"null");
if(saved){
  viewer.src=saved.model;
}

/* ===== Music ===== */
const bgm=document.getElementById("bgm");
document.getElementById("musicToggle").onclick=()=>{
  if(bgm.paused){bgm.play();event.target.innerText="Music: ON";}
  else{bgm.pause();event.target.innerText="Music: OFF";}
};

/* ===== Launch ===== */
document.getElementById("launchVR").onclick=()=>{
  localStorage.setItem("bloxd_mode", navigator.xr ? "xr":"fallback");
  location.href="vr.html";
};

document.getElementById("phoneVR").onclick=()=>{
  localStorage.setItem("bloxd_mode","mobile_vr");
  location.href="vr.html";
};

/* ===== XR Status ===== */
document.getElementById("xrStatus").innerText=
  navigator.xr ? "XR READY":"FALLBACK MODE";

/* ===== Controller Input ===== */
function pollControllers(){
  const gps=navigator.getGamepads();
  for(let gp of gps){
    if(!gp) continue;
    const data={
      trigger:gp.buttons[0]?.pressed,
      grip:gp.buttons[1]?.pressed,
      thumbX:gp.axes[0],
      thumbY:gp.axes[1]
    };
    window.InputBridge?.update(data);
  }
  requestAnimationFrame(pollControllers);
}
pollControllers();

/* ===== Mobile Gyro ===== */
if(/Android|iPhone|iPad/i.test(navigator.userAgent) && !navigator.xr){
  window.addEventListener("deviceorientation",(e)=>{
    window.CameraMod?.setRotation({
      alpha:e.alpha,beta:e.beta,gamma:e.gamma
    });
  });
}

/* ===== Boot ===== */
setTimeout(()=>{
  const b=document.getElementById("boot");
  b.style.opacity="0";
  setTimeout(()=>b.remove(),500);
},2000);

/* ===== Safe Bridges ===== */
window.InputBridge=window.InputBridge||{update:(d)=>{}};
window.CameraMod=window.CameraMod||{setRotation:(r)=>{}};

</script>

</body>
</html>
