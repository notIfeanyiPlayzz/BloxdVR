name: Build & Upload Meta Quest APK

on:
  push:
    branches:
      - main

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Android Keystore
        run: |
          keytool -genkeypair \
            -keystore user.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=BloxdVR,O=BloxdVR,C=US"

      - name: Upload Keystore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: user.keystore

      - name: Configure Bubblewrap
        run: |
          bubblewrap updateConfig \
            --jdkPath="$JAVA_HOME" \
            --androidSdkPath="$ANDROID_SDK_ROOT"

      - name: Build APK
        run: |
          bubblewrap build \
            --signingKeyPath=user.keystore \
            --signingKeyAlias="${{ secrets.KEY_ALIAS }}" \
            --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --signingKeyAliasPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Locate APK
        run: |
          mkdir -p build/Android
          APK=$(find . -name "*release*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi

          echo "Found APK: $APK"
          cp "$APK" build/Android/bloxdvr.apk

      - name: Setup Meta Quest CLI
        uses: RageAgainstThePixel/setup-ovr-platform-util@v1.2.0

      - name: Upload to Meta Quest Alpha
        uses: RageAgainstThePixel/upload-meta-quest-build@v2.2.0
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: build/Android
          releaseChannel: ALPHA
