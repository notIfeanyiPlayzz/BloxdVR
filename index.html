<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdVR v1.3.4 | Ultimate Hub</title>
    
    <!-- 🖼️ Favicon in /icons folder -->
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com"></script>

    <style>
        :root { --primary: #2ecc00; --bg: #050505; --panel: #111; --text: #eee; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Pixelify Sans', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .audio-toggle {
            position: fixed; top: 20px; right: 20px; background: var(--panel);
            border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; z-index: 100;
        }
        .main-hub {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
            background: var(--panel); padding: 40px; border-radius: 20px;
            border: 1px solid #333; max-width: 1050px; width: 95%;
        }
        .preview-pane { background: #000; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #222; }
        model-viewer { width: 100%; height: 320px; }
        .asset-monitor {
            background: #151515; padding: 12px; border-radius: 8px; margin-top: 15px; 
            font-size: 0.65rem; text-align: left; border-left: 3px solid var(--primary); font-family: monospace;
        }
        .asset-monitor b { color: #555; text-transform: uppercase; }
        .asset-monitor div { color: var(--primary); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; max-height: 320px; overflow-y: auto; }
        .avatar-card { background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; text-align: center; }
        .avatar-card.selected { border-color: var(--primary); background: #142514; }
        .avatar-card img { width: 50px; height: 50px; image-rendering: pixelated; }
        .enter-btn { 
            background: var(--primary); color: black; border: none; padding: 20px; font-size: 1.2rem; 
            font-weight: 900; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; font-family: 'Pixelify Sans', sans-serif;
        }
    </style>
</head>
<body>

    <button class="audio-toggle" id="musicBtn" onclick="toggleAudio()">MUSIC: OFF</button>
    <!-- 🎵 Adjusted Music Folder -->
    <audio id="bgMusic" loop src="music/minecraft-theme_q5K6toI.mp3"></audio>

    <div class="main-hub">
        <div class="preview-pane">
            <model-viewer id="view3D" src="models/Bob.glb" auto-rotate camera-controls exposure="1.2"></model-viewer>
            <h2 id="viewName" style="color:var(--primary); margin: 5px 0;">Bob</h2>
            <p id="viewDesc" style="font-size: 0.8rem; color: #888;">The iconic face of Bloxd.io.</p>
            <div class="asset-monitor">
                <b>Active Mesh:</b> <div id="fileModel">models/Bob.glb</div>
                <b>Skin Texture:</b> <div id="fileSkin">textures/2025_10_04_bob-skin-from-bloxd-io-23562468.png</div>
            </div>
        </div>

        <div class="content-pane" style="display: flex; flex-direction: column;">
            <div>
                <h1 style="margin:0; font-size: 2.2rem;">Bloxd<span style="color:var(--primary)">VR</span> Hub</h1>
                <p style="font-size: 0.85rem; color: #555;">v1.3.4 Stable • Asset Sync Verified</p>
            </div>
            <div class="avatar-grid" id="grid"></div>
            <div style="margin-top: auto;">
                <button class="enter-btn" onclick="enterWorld()">Launch Official Server</button>
            </div>
        </div>
    </div>

<script>
    // 📁 Data Registry using your exact texture filenames
    const characters = [
        { name: 'Bob', bio: 'The iconic face of Bloxd.io.', skin: '2025_10_04_bob-skin-from-bloxd-io-23562468.png' },
        { name: 'Emma', bio: 'Precision sky-builder and scout.', skin: '2025_10_04_emma-skin-from-bloxd-io-23562472.png' },
        { name: 'Leo', bio: 'Master architect and voxel engineer.', skin: '2025_10_04_leo-skin-from-bloxd-io-23562475.png' },
        { name: 'Isabel', bio: 'Veteran explorer of coastal biomes.', skin: '2025_10_19_isabelv2-23590830.png' },
        { name: 'Sanjay', bio: 'Expert survivalist and tracker.', skin: '2025_10_04_sanjay-skin-from-bloxd-io-23562484.png' },
        { name: 'Imara', bio: 'Agile scout for neon cityscapes.', skin: '2025_10_04_imara-skin-from-bloxd-io-23562482.png' },
        { name: 'Enoch', bio: 'The iron-clad frontline defender.', skin: '2025_10_07_enoch-skin-from-bloxd-23568141.png' },
        { name: 'Sara', bio: 'Elite merchant and mineral specialist.', skin: '2025_10_04_sara-skin-from-bloxd-io-23562479.png' }
    ];

    const grid = document.getElementById('grid');
    const view3D = document.getElementById('view3D');
    const viewName = document.getElementById('viewName');
    const viewDesc = document.getElementById('viewDesc');
    const fileModel = document.getElementById('fileModel');
    const fileSkin = document.getElementById('fileSkin');

    characters.forEach(char => {
        const card = document.createElement('div');
        card.className = `avatar-card ${char.name === 'Bob' ? 'selected' : ''}`;
        
        // 📁 Icons path: icons/[name]_icon.png
        card.innerHTML = `<img src="icons/${char.name.toLowerCase()}_icon.png" onerror="this.src='icons/favicon.ico'">`;
        
        card.onclick = () => {
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            view3D.src = `models/${char.name}.glb`;
            viewName.innerText = char.name;
            viewDesc.innerText = char.bio;
            
            // Updating the monitor to show your /textures/ folder
            fileModel.innerText = `models/${char.name}.glb`;
            fileSkin.innerText = `textures/${char.skin}`;
            
            localStorage.setItem('bloxd_avatar', char.name);
        };
        grid.appendChild(card);
    });

    function enterWorld() { window.location.href = 'https://bloxd.io'; }

    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    function toggleAudio() {
        if (music.paused) { music.play(); btn.innerText = "MUSIC: ON"; }
        else { music.pause(); btn.innerText = "MUSIC: OFF"; }
    }
</script>
</body>
</html>
