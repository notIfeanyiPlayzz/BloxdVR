name: Build & Upload Meta Quest APK

on:
  push:
    branches:
      - main

jobs:
  build-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export JAVA_HOME
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Generate Android Keystore
        run: |
          keytool -genkeypair \
            -keystore user.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=MetaQuestApp,O=Dev,C=US"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=user.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Locate APK
        run: |
          mkdir -p build/Android

          APK=$(find app/build/outputs/apk -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK not found!"
            exit 1
          fi

          echo "Found APK: $APK"
          cp "$APK" build/Android/bloxdvr.apk

      - name: Setup Meta Quest CLI
        uses: RageAgainstThePixel/setup-ovr-platform-util@v1.2.0

      - name: Upload to Meta Quest Alpha
        uses: RageAgainstThePixel/upload-meta-quest-build@v2.2.0
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: build/Android
          releaseChannel: ALPHA
