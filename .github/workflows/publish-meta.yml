name: Build and Publish to Meta Quest

on:
  push:
    branches:
      - main  # Triggers the pipeline when pushing code to the main branch

jobs:
  buildAndPublish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true  # Ensures large game assets are downloaded correctly

      - name: Cache Unity Project
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**') }}

      # 1. Build the Android APK using Game-CI
      - name: Build Unity Application (Android)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          androidKeystoreName: user.keystore
          androidKeystoreBase64: ${{ secrets.KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.KEYSTORE_PASSWORD }}
          androidKeyaliasName: ${{ secrets.KEY_ALIAS }}
          androidKeyaliasPass: ${{ secrets.KEY_PASSWORD }}

      # 2. Upload the compiled APK to the Meta Horizon Store
      - name: Upload Build to Meta Quest Store
        uses: RageAgainstThePixel/upload-meta-quest-build@v2
        with:
          appId: ${{ secrets.META_APP_ID }}
          appSecret: ${{ secrets.META_APP_SECRET }}
          buildDir: 'build/Android'  # Path to the folder containing your generated APK
          releaseChannel: 'ALPHA'    # Choices: ALPHA, BETA, RC, or PRODUCTION

