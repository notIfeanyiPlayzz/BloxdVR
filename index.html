<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BloxdVR v1.3.2 - Stable Icons</title>
    <style>
        :root { --primary: #2ecc00; --bg: #0d0d0d; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .avatar-card { background: #1a1a1a; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: 0.2s; }
        .avatar-card:hover { border-color: var(--primary); }
        .avatar-card.selected { border-color: var(--primary); background: #142514; }
        .avatar-card img { width: 64px; height: 64px; image-rendering: pixelated; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>BloxdVR <span style="color:var(--primary)">v1.3.2</span></h1>
    <div class="avatar-grid" id="grid"></div>
    <button onclick="window.location.href='https://bloxd.io'" style="background:var(--primary); padding:15px 40px; border-radius:5px; cursor:pointer; font-weight:bold;">ENTER BLOXD VR</button>

<script>
    const avatarList = [
        { name: 'Bob' }, { name: 'Leo' }, { name: 'Sanjay' }, { name: 'Enoch' },
        { name: 'Emma' }, { name: 'Isabel' }, { name: 'Imara' }, { name: 'Sara' }
    ];

    const grid = document.getElementById('grid');
    let selected = localStorage.getItem('bloxd_avatar') || 'Bob';

    avatarList.forEach(p => {
        const card = document.createElement('div');
        card.className = `avatar-card ${selected === p.name ? 'selected' : ''}`;
        
        // RELATIVE PATH: This forces the browser to stay inside the BloxdVR folder
        const iconPath = `./assets/icons/${p.name.toLowerCase()}_icon.png`;

        card.innerHTML = `
            <img src="${iconPath}" alt="${p.name}" 
                 onerror="this.src='https://www.minecraftskins.com'; console.error('Failed to load local icon for ${p.name}');">
            <div style="margin-top:8px;">${p.name}</div>
        `;

        card.onclick = () => {
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            localStorage.setItem('bloxd_avatar', p.name);
        };
        grid.appendChild(card);
    });
</script>
</body>
</html>
