<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BloxdVR v1.3.3 | Ultimate Hub</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        :root { --primary: #2ecc00; --bg: #050505; --panel: #111; --text: #eee; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }

        /* 🎧 Music Button */
        .audio-toggle {
            position: fixed; top: 20px; right: 20px; background: var(--panel);
            border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; transition: 0.3s; z-index: 100;
        }

        .main-hub {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px;
            background: var(--panel); padding: 40px; border-radius: 20px;
            border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.7);
            max-width: 1050px; width: 95%;
        }

        /* 🧊 3D Model View */
        .preview-pane {
            background: #000; border-radius: 12px; padding: 20px;
            text-align: center; border: 1px solid #222;
        }
        model-viewer {
            width: 100%; height: 320px; margin-bottom: 15px;
            --poster-color: transparent;
        }

        .asset-monitor {
            background: #151515; padding: 12px; border-radius: 8px;
            margin-top: 15px; font-size: 0.7rem; text-align: left;
            border-left: 3px solid var(--primary); font-family: monospace;
        }
        .asset-monitor b { color: #555; font-size: 0.65rem; text-transform: uppercase; }
        .asset-monitor div { color: var(--primary); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }

        /* 👤 Grid */
        .avatar-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 12px; margin: 20px 0; max-height: 300px; overflow-y: auto;
            padding-right: 10px;
        }
        .avatar-grid::-webkit-scrollbar { width: 5px; }
        .avatar-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .avatar-card { 
            background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s; text-align: center;
        }
        .avatar-card:hover { border-color: #444; background: #222; }
        .avatar-card.selected { border-color: var(--primary); background: #142514; }
        .avatar-card img { width: 50px; height: 50px; image-rendering: pixelated; }

        .enter-btn { 
            background: var(--primary); color: black; border: none;
            padding: 20px; font-size: 1.2rem; font-weight: 900;
            border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%;
            text-transform: uppercase;
        }
        .enter-btn:hover { letter-spacing: 2px; filter: brightness(1.2); box-shadow: 0 0 20px rgba(46, 204, 0, 0.4); }
    </style>
</head>
<body>

    <button class="audio-toggle" id="musicBtn" onclick="toggleAudio()">MUSIC: OFF</button>
    <audio id="bgMusic" loop src="./assets/music/minecraft-theme_q5K6toI.mp3"></audio>

    <div class="main-hub">
        <!-- Sidebar: 3D Viewer -->
        <div class="preview-pane">
            <model-viewer id="view3D" src="./assets/models/Bob.glb" 
                auto-rotate camera-controls shadow-intensity="1" 
                environment-image="neutral" exposure="1.2">
            </model-viewer>
            
            <h2 id="viewName" style="color:var(--primary); margin: 5px 0;">Bob</h2>
            <p id="viewDesc" style="font-size: 0.8rem; color: #888;">Default Scout</p>

            <div class="asset-monitor">
                <b>Active Mesh:</b>
                <div id="fileModel">models/Bob.glb</div>
                <b>Active Texture:</b>
                <div id="fileSkin">textures/2025_10_04_bob...</div>
            </div>
        </div>

        <!-- Main Content: Selection -->
        <div class="content-pane">
            <div style="margin-bottom: 20px;">
                <h1 style="margin:0; font-size: 2rem;">Bloxd<span style="color:var(--primary)">VR</span></h1>
                <p style="font-size: 0.85rem; color: #666;">v1.3.3 Build • [WebGL/WebXR Engine Active]</p>
            </div>

            <div class="avatar-grid" id="grid"></div>

            <div style="margin-top: auto;">
                <button class="enter-btn" onclick="enterWorld()">Enter Bloxd.io</button>
            </div>
        </div>
    </div>

<script>
    // 🗃️ Complete Skin Registry from your Assets Folder
    const characters = [
        { name: 'Bob', bio: 'The classic frontier scout.', skin: '2025_10_04_bob-skin-from-bloxd-io-23562468.png' },
        { name: 'Emma', bio: 'Precision sky-builder.', skin: '2025_10_04_emma-skin-from-bloxd-io-23562472.png' },
        { name: 'Leo', bio: 'Master voxel architect.', skin: '2025_10_04_leo-skin-from-bloxd-io-23562475.png' },
        { name: 'Isabel', bio: 'Oceanic explorer.', skin: '2025_10_19_isabelv2-23590830.png' },
        { name: 'Sanjay', bio: 'Expert survivalist.', skin: '2025_10_04_sanjay-skin-from-bloxd-io-23562484.png' },
        { name: 'Imara', bio: 'Neon city specialist.', skin: '2025_10_04_imara-skin-from-bloxd-io-23562482.png' },
        { name: 'Enoch', bio: 'The iron-clad guardian.', skin: '2025_10_07_enoch-skin-from-bloxd-23568141.png' },
        { name: 'Sara', bio: 'High-altitude merchant.', skin: '2025_10_04_sara-skin-from-bloxd-io-23562479.png' }
    ];

    const grid = document.getElementById('grid');
    const view3D = document.getElementById('view3D');
    const viewName = document.getElementById('viewName');
    const viewDesc = document.getElementById('viewDesc');
    const fileModel = document.getElementById('fileModel');
    const fileSkin = document.getElementById('fileSkin');

    characters.forEach(char => {
        const card = document.createElement('div');
        card.className = `avatar-card ${char.name === 'Bob' ? 'selected' : ''}`;
        card.innerHTML = `<img src="./assets/icons/${char.name.toLowerCase()}_icon.png" onerror="this.src='https://bloxd.io'">`;
        
        card.onclick = () => {
            document.querySelectorAll('.avatar-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            
            // UI Updates
            view3D.src = `./assets/models/${char.name}.glb`;
            viewName.innerText = char.name;
            viewDesc.innerText = char.bio;
            
            // Monitor Updates
            fileModel.innerText = `models/${char.name}.glb`;
            fileSkin.innerText = `textures/${char.skin}`;
            
            localStorage.setItem('bloxd_avatar', char.name);
        };
        grid.appendChild(card);
    });

    function enterWorld() { window.location.href = 'https://bloxd.io'; }

    // Audio Control
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    function toggleAudio() {
        if (music.paused) { music.play(); btn.innerText = "MUSIC: ON"; btn.style.background = "var(--primary)"; btn.style.color = "black"; }
        else { music.pause(); btn.innerText = "MUSIC: OFF"; btn.style.background = "var(--panel)"; btn.style.color = "var(--primary)"; }
    }
</script>
</body>
</html>
